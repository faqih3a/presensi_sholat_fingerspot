version: '3.8'
services:
  # 1. Database
  db:
    image: mariadb:10.5
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: Thurs1n@
      MARIADB_DATABASE: presensi_sholat
    volumes:
      - ./db_data:/var/lib/mysql

  # 2. PHP-FPM App
  php:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www
    restart: always

  # 3. Caddy Web Server (Port 8080)
  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - php

  # 4. Nginx Reverse Proxy (Port 80)
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8085:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - caddy

volumes:
  caddy_data:
  caddy_config:
